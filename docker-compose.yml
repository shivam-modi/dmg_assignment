services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moviebooking
      POSTGRES_USER: moviebooking
      POSTGRES_PASSWORD: moviebooking
    ports:
      - "5433:5432"
    volumes:
      - moviebooking_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moviebooking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  moviebooking_pgdata:
